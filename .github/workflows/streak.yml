name: Update Daily Streak

on:
  schedule:
    - cron: "5 3 * * *"
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update streak
        run: node scripts/streak.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add streak.json badges/streak.svg

          git diff --cached --quiet || (
            git commit -m "Update streak"
            git push
          )
