<svg xmlns="http://www.w3.org/2000/svg" width="179" height="20" role="img" aria-label="🔥 Daily Streak: 4 days">
  <title>🔥 Daily Streak: 4 days</title>
  <linearGradient id="smooth" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>

  <clipPath id="round">
    <rect width="179" height="20" rx="3" fill="#fff"/>
  </clipPath>

  <g clip-path="url(#round)">
    <rect width="119" height="20" fill="#555"/>
    <rect x="119" width="60" height="20" fill="#fe7d37"/>
    <rect width="179" height="20" fill="url(#smooth)"/>
  </g>

  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
    <text x="59.5" y="14.5" fill="#010101" fill-opacity=".3">🔥 Daily Streak</text>
    <text x="59.5" y="13.5">🔥 Daily Streak</text>
    <text x="149" y="14.5" fill="#010101" fill-opacity=".3">4 days</text>
    <text x="149" y="13.5">4 days</text>
  </g>
</svg>
